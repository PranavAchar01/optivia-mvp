model_list:
  # Haiku — classifier, scorer, quality monitor (cheapest)
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 4096

  # Sonnet — clarifier, synthesizer, fleet generator (balanced)
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 16384

  # Opus — complex tasks, verifier (strongest)
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 32768

  # Gemini Pro (for testing)
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192

  # Fallback chain (§8.3): sonnet → sonnet-4-5 → bedrock
  - model_name: claude-sonnet-4-6-fallback
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      fallbacks: ["claude-haiku-4-5"]

litellm_settings:
  # Langfuse observability (§9.1)
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
  langfuse_host: os.environ/LANGFUSE_HOST

  # Idempotency — every call keyed by (request_id, attempt_number) §8.3
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 600

  # Token budget caps per tier (§8.2)
  max_budget: 10.0
  budget_duration: 1d

  # Request timeout
  request_timeout: 120

  # Drop params unsupported by some models
  drop_params: true

  # Retry config
  num_retries: 2
  retry_after: 5

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false
