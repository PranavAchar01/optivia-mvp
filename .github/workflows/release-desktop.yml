name: Release desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install JS deps
        run: npm ci

      - name: Build Tauri bundle
        env:
          # Signing is optional: set these secrets for production releases.
          # Without them the build still succeeds but produces unsigned bundles
          # (Gatekeeper-blocked on macOS until notarised or right-click→Open).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p ../release-out
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR/dmg" ]; then
            cp "$BUNDLE_DIR/dmg/"*.dmg ../release-out/ 2>/dev/null || true
          fi
          if [ -d "$BUNDLE_DIR/macos" ]; then
            for app in "$BUNDLE_DIR/macos/"*.app; do
              [ -e "$app" ] || continue
              base="$(basename "$app" .app)"
              (cd "$BUNDLE_DIR/macos" && zip -qr "../../../../../../release-out/${base}-${{ matrix.artifact }}.app.zip" "$base.app")
            done
          fi
          if [ -d "$BUNDLE_DIR/appimage" ]; then
            cp "$BUNDLE_DIR/appimage/"*.AppImage ../release-out/ 2>/dev/null || true
          fi
          if [ -d "$BUNDLE_DIR/deb" ]; then
            cp "$BUNDLE_DIR/deb/"*.deb ../release-out/ 2>/dev/null || true
          fi
          ls -la ../release-out

      - uses: actions/upload-artifact@v4
        with:
          name: optivia-${{ matrix.artifact }}
          path: release-out/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-out
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/*
          generate_release_notes: true
          draft: false
          prerelease: false
